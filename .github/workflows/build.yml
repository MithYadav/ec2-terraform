name: Terraform - Create Fresh EC2 Instance

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'apply'
        type: choice
        options:
          - plan
          - apply
          - destroy

# Required for OIDC
permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
    # ─────────────────────────────────────────
    # STEP 1 - Checkout
    # ─────────────────────────────────────────
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ─────────────────────────────────────────
    # STEP 2 - Assume Role via OIDC
    # ─────────────────────────────────────────
    - name: Configure AWS Credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::373447294485:role/EC2TerraformRole
        role-session-name: GitHubActionsSession
        aws-region: us-east-1

    # ─────────────────────────────────────────
    # STEP 3 - Verify Role
    # ─────────────────────────────────────────
    - name: Verify AWS Identity
      run: |
        aws sts get-caller-identity
        echo "Role assumed successfully! ✅"

    # ─────────────────────────────────────────
    # STEP 4 - Bootstrap State Backend
    # Creates S3 + DynamoDB for tfstate only
    # NOT managed by Terraform!
    # ─────────────────────────────────────────
    - name: Bootstrap State Backend
      working-directory: .
      run: |
        STATE_BUCKET="ec2-terraform-state-373447294485"
        LOCK_TABLE="ec2-terraform-state-lock"
        REGION="us-east-1"

        echo "========================================="
        echo " Bootstrapping State Backend"
        echo "========================================="

        # ── Create S3 state bucket if not exists ──
        if aws s3api head-bucket \
          --bucket $STATE_BUCKET 2>/dev/null; then
          echo "State bucket exists: $STATE_BUCKET ✅"
        else
          echo "Creating state bucket: $STATE_BUCKET"

          aws s3api create-bucket \
            --bucket $STATE_BUCKET \
            --region $REGION

          sleep 5

          aws s3api put-bucket-versioning \
            --bucket $STATE_BUCKET \
            --versioning-configuration Status=Enabled
          echo "Versioning enabled! ✅"

          aws s3api put-bucket-encryption \
            --bucket $STATE_BUCKET \
            --server-side-encryption-configuration '{
              "Rules": [{
                "ApplyServerSideEncryptionByDefault": {
                  "SSEAlgorithm": "AES256"
                }
              }]
            }'
          echo "Encryption enabled! ✅"

          aws s3api put-public-access-block \
            --bucket $STATE_BUCKET \
            --public-access-block-configuration \
              "BlockPublicAcls=true,\
               IgnorePublicAcls=true,\
               BlockPublicPolicy=true,\
               RestrictPublicBuckets=true"
          echo "Public access blocked! ✅"

          echo "State bucket created: $STATE_BUCKET ✅"
        fi

        # ── Create DynamoDB lock table if not exists ──
        if aws dynamodb describe-table \
          --table-name $LOCK_TABLE \
          --region $REGION 2>/dev/null; then
          echo "Lock table exists: $LOCK_TABLE ✅"
        else
          echo "Creating lock table: $LOCK_TABLE"

          aws dynamodb create-table \
            --table-name $LOCK_TABLE \
            --attribute-definitions \
              AttributeName=LockID,AttributeType=S \
            --key-schema \
              AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region $REGION

          aws dynamodb wait table-exists \
            --table-name $LOCK_TABLE \
            --region $REGION

          echo "Lock table created: $LOCK_TABLE ✅"
        fi

        echo "========================================="
        echo " Bootstrap Complete!"
        echo " S3      : $STATE_BUCKET"
        echo " DynamoDB: $LOCK_TABLE"
        echo "========================================="

    # ─────────────────────────────────────────
    # STEP 5 - Setup Terraform
    # ─────────────────────────────────────────
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        t
