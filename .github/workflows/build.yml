name: Terraform - Create Fresh EC2 Instance

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'apply'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::373447294485:role/EC2TerraformRole
        role-session-name: GitHubActionsSession
        aws-region: us-east-1

    - name: Verify AWS Identity
      run: |
        aws sts get-caller-identity
        echo "Role assumed successfully!"

    # ─────────────────────────────────────────
    # Bootstrap State Backend
    # ─────────────────────────────────────────
    - name: Bootstrap State Backend
      working-directory: ${{ github.workspace }}
      run: |
        STATE_BUCKET="ec2-terraform-state-373447294485"
        REGION="us-east-1"

        echo "========================================="
        echo "Bootstrapping State Backend"
        echo "========================================="

        if aws s3api head-bucket --bucket $STATE_BUCKET 2>/dev/null; then
          echo "State bucket exists: $STATE_BUCKET"
        else
          echo "Creating state bucket: $STATE_BUCKET"

          aws s3api create-bucket \
            --bucket $STATE_BUCKET \
            --region $REGION

          sleep 5

          aws s3api put-bucket-versioning \
            --bucket $STATE_BUCKET \
            --versioning-configuration Status=Enabled

          ENCRYPTION_CONFIG='{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          aws s3api put-bucket-encryption \
            --bucket $STATE_BUCKET \
            --server-side-encryption-configuration $ENCRYPTION_CONFIG

          aws s3api put-public-access-block \
            --bucket $STATE_BUCKET \
            --public-access-block-configuration \
            "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

          echo "State bucket created!"
        fi

        echo "Bootstrap Complete!"

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.12.0

    - name: Terraform Init
      run: |
        terraform init
        echo "Terraform initialized!"

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Format Check
      run: terraform fmt -check
      continue-on-error: true

    - name: Terraform Plan
      run: |
        terraform plan \
          -var="aws_region=us-east-1" \
          -var="environment=prod" \
          -var="project_name=EC2App" \
          -var="instance_type=t2.micro" \
          -var="ami_id=ami-0c02fb55956c7d316" \
          -out=tfplan
        echo "Terraform plan complete!"

    - name: Terraform Apply
      if: |
        github.ref == 'refs/heads/main' &&
        (github.event_name == 'push' ||
        github.event.inputs.action == 'apply')
      run: |
        terraform apply -auto-approve tfplan
        echo "EC2 created!"

    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      run: |
        terraform destroy -auto-approve \
          -var="aws_region=us-east-1" \
          -var="environment=prod" \
          -var="project_name=EC2App" \
          -var="instance_type=t2.micro" \
          -var="ami_id=ami-0c02fb55956c7d316"
        echo "EC2 destroyed!"

    # ─────────────────────────────────────────
    # Download PEM from S3
    # Save EC2 IP for deploy pipeline
    # ─────────────────────────────────────────
    - name: Get EC2 Info and Download PEM
      if: github.event.inputs.action != 'destroy'
      run: |
        PUBLIC_IP=$(terraform output -raw public_ip)
        PEM_S3_PATH="s3://ec2-terraform-state-373447294485/keys/EC2App-deploy-key.pem"

        echo "========================================="
        echo "  EC2 CREATED SUCCESSFULLY!"
        echo "  Public IP : $PUBLIC_IP"
        echo "  PEM File  : $PEM_S3_PATH"
        echo "========================================="

        echo "Downloading PEM file from S3..."
        aws s3 cp $PEM_S3_PATH ./EC2App-deploy-key.pem
        chmod 600 ./EC2App-deploy-key.pem
        echo "PEM file downloaded!"

        echo "Testing SSH connection..."
        ssh-keyscan -H $PUBLIC_IP >> ~/.ssh/known_hosts
        ssh -i ./EC2App-deploy-key.pem \
          -o StrictHostKeyChecking=no \
          ec2-user@$PUBLIC_IP \
          "echo 'SSH connection successful!'"

        echo "========================================="
        echo "  Add to GitHub Secrets for deploy:"
        echo "  EC2_HOST = $PUBLIC_IP"
        echo "  EC2_SSH_KEY = (download from S3)"
        echo "  $PEM_S3_PATH"
        echo "========================================="

    - name: Show Outputs
      if: github.event.inputs.action != 'destroy'
      run: terraform output
