name: Terraform - Create Fresh EC2 Instance

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'apply'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::373447294485:role/EC2TerraformRole
        role-session-name: GitHubActionsSession
        aws-region: us-east-1

    - name: Verify AWS Identity
      run: |
        aws sts get-caller-identity
        echo "Role assumed successfully!"

    # ─────────────────────────────────────────
    # Bootstrap - S3 only (no DynamoDB needed)
    # use_lockfile = true handles locking in S3
    # ─────────────────────────────────────────
    - name: Bootstrap State Backend
      working-directory: ${{ github.workspace }}
      run: |
        STATE_BUCKET="ec2-terraform-state-373447294485"
        REGION="us-east-1"

        echo "========================================="
        echo "Bootstrapping State Backend"
        echo "========================================="

        if aws s3api head-bucket --bucket $STATE_BUCKET 2>/dev/null; then
          echo "State bucket exists: $STATE_BUCKET"
        else
          echo "Creating state bucket: $STATE_BUCKET"

          aws s3api create-bucket \
            --bucket $STATE_BUCKET \
            --region $REGION

          sleep 5

          aws s3api put-bucket-versioning \
            --bucket $STATE_BUCKET \
            --versioning-configuration Status=Enabled
          echo "Versioning enabled!"

          ENCRYPTION_CONFIG='{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          aws s3api put-bucket-encryption \
            --bucket $STATE_BUCKET \
            --server-side-encryption-configuration $ENCRYPTION_CONFIG
          echo "Encryption enabled!"

          aws s3api put-public-access-block \
            --bucket $STATE_BUCKET \
            --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          echo "Public access blocked!"

          echo "State bucket created: $STATE_BUCKET"
        fi

        echo "========================================="
        echo "Bootstrap Complete!"
        echo "S3 Bucket: $STATE_BUCKET"
        echo "Locking  : S3 Native Lockfile"
        echo "========================================="

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.12.0

    - name: Terraform Init
      run: |
        terraform init
        echo "Terraform initialized!"

    - name: Terraform Validate
      run: |
        terraform validate
        echo "Terraform valid!"

    - name: Terraform Format Check
      run: terraform fmt -check
      continue-on-error: true

    - name: Terraform Plan
      run: |
        terraform plan \
          -var="aws_region=us-east-1" \
          -var="environment=prod" \
          -var="project_name=EC2App" \
          -var="instance_type=t2.micro" \
          -var="ami_id=ami-0c02fb55956c7d316" \
          -out=tfplan
        echo "Terraform plan complete!"

    - name: Terraform Apply
      if: |
        github.ref == 'refs/heads/main' &&
        (github.event_name == 'push' ||
        github.event.inputs.action == 'apply')
      run: |
        terraform apply -auto-approve tfplan
        echo "EC2 instance created!"

    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      run: |
        terraform destroy -auto-approve \
          -var="aws_region=us-east-1" \
          -var="environment=prod" \
          -var="project_name=EC2App" \
          -var="instance_type=t2.micro" \
          -var="ami_id=ami-0c02fb55956c7d316"
        echo "EC2 destroyed!"

    - name: Show Outputs
      if: github.event.inputs.action != 'destroy'
      run: |
        echo "========================================="
        echo "  TERRAFORM OUTPUTS"
        echo "========================================="
        terraform output
        echo "========================================="
        echo "  STATE FILE LOCATION"
        echo "  Bucket : ec2-terraform-state-373447294485"
        echo "  Key    : ec2/terraform.tfstate"
        echo "  Locking: S3 Native Lockfile"
        echo "========================================="
