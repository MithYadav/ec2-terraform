name: Terraform - Create Fresh EC2 Instance

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'apply'
        type: choice
        options:
          - plan
          - apply
          - destroy

# Required for OIDC
permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
    # ─────────────────────────────────────────
    # STEP 1 - Checkout
    # ─────────────────────────────────────────
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ─────────────────────────────────────────
    # STEP 2 - Assume Role via OIDC
    # ─────────────────────────────────────────
    - name: Configure AWS Credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::373447294485:role/EC2TerraformRole
        role-session-name: GitHubActionsSession
        aws-region: us-east-1

    # ─────────────────────────────────────────
    # STEP 3 - Verify Role
    # ─────────────────────────────────────────
    - name: Verify AWS Identity
      run: |
        aws sts get-caller-identity
        echo "Role assumed successfully! ✅"

    # ─────────────────────────────────────────
    # STEP 4 - Bootstrap State Backend
    # ─────────────────────────────────────────
    - name: Bootstrap State Backend
      working-directory: ${{ github.workspace }}
      run: |
        STATE_BUCKET="ec2-terraform-state-373447294485"
        LOCK_TABLE="ec2-terraform-state-lock"
        REGION="us-east-1"

        echo "========================================="
        echo " Bootstrapping State Backend"
        echo "========================================="

        # ── Create S3 state bucket if not exists ──
        if aws s3api head-bucket \
          --bucket $STATE_BUCKET 2>/dev/null; then
          echo "State bucket exists: $STATE_BUCKET ✅"
        else
          echo "Creating state bucket:
